name: Android Release CI

# 触发条件：当推送到 main 分支，或者手动触发（workflow_dispatch）时
on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # 1. 拉取源代码
    - name: Checkout code
      uses: actions/checkout@v4

    # 2. 设置 JDK 环境（现代 Android 项目建议至少 Java 17）
    - name: set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: gradle

    # 3. 授予 Gradle 执行权限
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    # 4. 从 GitHub Secrets 解密出证书文件，并写入到 app 目录下
    - name: Decode Keystore
      env:
        ENCODED_STRING: ${{ secrets.SIGNING_KEY }}
      run: |
        echo "$ENCODED_STRING" | base64 --decode > app/release.jks

    # 5. 执行 Gradle 编译命令
    - name: Build Release APK
      env:
        KEYSTORE_PATH: "release.jks" # 这里填相对 app 目录的路径
        KEY_STORE_PASSWORD: ${{ secrets.KEY_STORE_PASSWORD }}
        ALIAS: ${{ secrets.ALIAS }}
        KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
      run: ./gradlew assembleRelease

    # 6. 将构建好的 APK 上传到 GitHub Actions 的 Artifacts 中供下载
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: release-apk
        path: app/build/outputs/apk/release/app-release.apk
